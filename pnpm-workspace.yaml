packages:
  - 'packages/*'

# pnpm 11: settings moved here from the package.json "pnpm" field,
# which is no longer read. https://pnpm.io/settings
overrides:
  'ansi-regex@>=5.0.0 <5.0.1': 5.0.1
  minimist: ^1.2.6
  shell-quote: ^1.7.3
  tmp: '>=0.2.7'
  form-data: '>=4.0.6'
  tar: '>=7.5.16'
  piscina: '>=4.9.3'
  undici: '>=6.27.0'
  js-yaml: '>=4.2.0'

# pnpm 11 replaced onlyBuiltDependencies with allowBuilds.
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  nx: true
  unrs-resolver: true
