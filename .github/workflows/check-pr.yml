name: Check PR

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    name: Check PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Setup pnpm
        # Version comes from the packageManager field in package.json.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Run build
        run: pnpm exec turbo run build

      - name: Run lint
        run: pnpm -r run lint

      - name: Run tests
        # Serialize package test tasks: each PGlite/WASM-backed suite is
        # CPU-heavy on cold start, and running several at once on the small CI
        # runner starves them into 5s test timeouts. One package at a time keeps
        # each suite fast. Local dev keeps full turbo concurrency.
        run: pnpm exec turbo run test --concurrency=1

  changeset:
    name: Changeset present
    runs-on: ubuntu-latest
    # Skip on the Changesets-generated version PR: it intentionally removes all
    # changesets as it bumps versions, so the presence check would always fail.
    if: github.head_ref != 'changeset-release/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so changeset can diff against the PR base branch.
          fetch-depth: 0

      - name: Setup pnpm
        # Version comes from the packageManager field in package.json.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require a changeset
        # Fails (exit 1) if the PR adds no changeset. Docs/CI-only PRs that
        # need no release should include an empty changeset:
        #   pnpm changeset --empty
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          pnpm exec changeset status --since="origin/$BASE_REF"

  pg-smoke:
    name: Postgres driver smoke tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_TEST_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Setup pnpm
        # Version comes from the packageManager field in package.json.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile

      - name: Run build
        # Needed so lib/migrations/*.sql exist for the -pg adapters' connect().
        run: pnpm exec turbo run build

      - name: Run Postgres driver smoke tests
        # Only the three -pg suites; everything else is covered by `check`.
        # Serialized so the three suites don't create/drop databases on the
        # same Postgres server concurrently.
        run: |
          pnpm exec turbo run test \
            --filter=./packages/core-pg \
            --filter=./packages/journal-pg \
            --filter=./packages/digest-pg \
            --concurrency=1
